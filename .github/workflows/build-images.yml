name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'reporting-commercial/backend/**'
      - 'reporting-commercial/frontend/**'
      - 'reporting-commercial/Dockerfile.*'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:   # permet de lancer manuellement depuis GitHub

env:
  REGISTRY: ghcr.io
  OWNER: kamalfaiz

jobs:
  build-and-push:
    name: Build & Push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ────────────────────────────────────────────
      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./reporting-commercial
          file: ./reporting-commercial/Dockerfile.backend
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/optiboard-backend:latest
            ghcr.io/${{ env.OWNER }}/optiboard-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ───────────────────────────────────────────
      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./reporting-commercial
          file: ./reporting-commercial/Dockerfile.frontend
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/optiboard-frontend:latest
            ghcr.io/${{ env.OWNER }}/optiboard-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resume
        run: |
          echo "Images publiees sur GHCR :"
          echo "  ghcr.io/${{ env.OWNER }}/optiboard-backend:latest"
          echo "  ghcr.io/${{ env.OWNER }}/optiboard-frontend:latest"
