name: Deploy OptiBoard

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────
  # DEPLOY : tourne directement sur le serveur Windows
  # Python + Node deja installes, IIS actif
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Windows Server
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      # ── Backend : installer les dependances Python ──────
      - name: Install Python dependencies
        working-directory: reporting-commercial/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: powershell

      # ── Frontend : build React ───────────────────────────
      - name: Install Node dependencies
        working-directory: reporting-commercial/frontend
        run: npm ci
        shell: powershell

      - name: Build React frontend
        working-directory: reporting-commercial/frontend
        run: npm run build
        shell: powershell
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}

      # ── Copier le frontend dans IIS ──────────────────────
      - name: Deploy frontend to IIS
        run: |
          $dest = "C:\inetpub\wwwroot\optiboard"
          if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Copy-Item -Path "reporting-commercial\frontend\dist\*" -Destination $dest -Recurse -Force
          Write-Host "Frontend deploye dans $dest"
        shell: powershell

      # ── Copier le backend ────────────────────────────────
      - name: Deploy backend files
        run: |
          $dest = "C:\optiboard\backend"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Copy-Item -Path "reporting-commercial\backend\*" -Destination $dest -Recurse -Force
          Write-Host "Backend deploye dans $dest"
        shell: powershell

      # ── Redemarrer le backend ────────────────────────────
      - name: Restart backend service
        run: |
          $task = "OptiBoard-Backend"
          $existing = Get-ScheduledTask -TaskName $task -ErrorAction SilentlyContinue
          if ($existing) {
            Stop-ScheduledTask -TaskName $task -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
            Start-ScheduledTask -TaskName $task
            Write-Host "Backend redémarre"
          } else {
            Write-Host "Service backend non trouve - lancer setup-prod.ps1 d'abord"
            exit 1
          }
        shell: powershell

      # ── Health check ─────────────────────────────────────
      - name: Health check
        run: |
          Start-Sleep -Seconds 15
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:8080/api/docs" -UseBasicParsing -TimeoutSec 30
            if ($r.StatusCode -eq 200) { Write-Host "Backend OK" }
          } catch {
            Write-Error "Backend ne repond pas"
            Get-Content "C:\optiboard\logs\backend.log" -Tail 30 -ErrorAction SilentlyContinue
            exit 1
          }
        shell: powershell

      # ── Reload IIS ───────────────────────────────────────
      - name: Reload IIS
        run: iisreset /noforce
        shell: cmd

  # ─────────────────────────────────────────────────────────
  # PR CHECK : validation syntaxe seulement
  # ─────────────────────────────────────────────────────────
  check:
    name: PR Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check Python syntax
        run: find reporting-commercial/backend -name "*.py" -exec python3 -m py_compile {} \;
      - name: Check package.json
        run: node -e "JSON.parse(require('fs').readFileSync('reporting-commercial/frontend/package.json'))"
