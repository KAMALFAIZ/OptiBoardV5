name: Build & Deploy OptiBoard

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/kamalfaiz/optiboard-backend
  IMAGE_FRONTEND: ghcr.io/kamalfaiz/optiboard-frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Build & Push Docker images
  # (tourne sur GitHub, pas sur ton serveur)
  # ─────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./reporting-commercial/backend
          file: ./reporting-commercial/backend/Dockerfile.backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./reporting-commercial/frontend
          file: ./reporting-commercial/frontend/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.PROD_API_URL }}

  # ─────────────────────────────────────────
  # JOB 2 : Deploy sur le serveur Windows
  # via Self-hosted Runner installé sur le serveur
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Windows Server
    runs-on: self-hosted          # ← tourne directement sur ton serveur
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest Docker images
        run: |
          docker compose -f docker-compose.prod.yml pull

      - name: Deploy containers
        run: |
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Cleanup old images
        run: |
          docker image prune -f

      - name: Health check
        run: |
          Start-Sleep -Seconds 15
          $response = Invoke-WebRequest -Uri "http://localhost:8080/api/docs" -UseBasicParsing -TimeoutSec 30
          if ($response.StatusCode -eq 200) {
            Write-Host "Backend OK"
          } else {
            Write-Error "Backend health check failed"
            exit 1
          }
        shell: powershell

  # ─────────────────────────────────────────
  # JOB 3 : PR check (sans déploiement)
  # ─────────────────────────────────────────
  check:
    name: PR Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.prod.yml config --quiet
