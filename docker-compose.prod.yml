# ============================================================
# OptiBoard v5 - Production Docker Compose
# Compatible Windows Server 2022
# Images buildees par GitHub Actions -> GHCR
# ============================================================

services:

  # -- Backend FastAPI -----------------------------------------
  backend:
    image: ghcr.io/kamalfaiz/optiboard-backend:latest
    platform: linux/amd64
    container_name: optiboard-backend
    restart: always
    env_file: .env
    environment:
      - DB_SERVER=${DB_SERVER}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DRIVER=ODBC Driver 17 for SQL Server
      - DEBUG=False
      - CACHE_TTL=${CACHE_TTL:-300}
      - MAX_ROWS=${MAX_ROWS:-10000}
      - QUERY_TIMEOUT=${QUERY_TIMEOUT:-30}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    volumes:
      - backend_logs:/app/logs
    networks:
      - optiboard-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # -- Frontend React/Nginx ------------------------------------
  frontend:
    image: ghcr.io/kamalfaiz/optiboard-frontend:latest
    platform: linux/amd64
    container_name: optiboard-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - optiboard-net

  # -- Watchtower : mises a jour automatiques ------------------
  watchtower:
    image: containrrr/watchtower
    platform: linux/amd64
    container_name: optiboard-watchtower
    restart: always
    volumes:
      - type: npipe
        source: \\.\pipe\docker_engine
        target: /var/run/docker.sock
      - ${USERPROFILE}/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=true
    command: --interval 300

volumes:
  backend_logs:
    driver: local

networks:
  optiboard-net:
    driver: bridge
